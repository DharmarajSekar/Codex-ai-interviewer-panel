apiVersion: apps/v1
kind: Deployment
metadata: { name: api, namespace: interviewer }
spec:
  replicas: 3
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/org/interviewer-api:latest
          ports: [{containerPort: 8080}]
          envFrom: [{secretRef: {name: app-secrets}}, {configMapRef: {name: app-config}}]
          readinessProbe: {httpGet: {path: /healthz, port: 8080}, initialDelaySeconds: 10}
          livenessProbe: {httpGet: {path: /healthz, port: 8080}, initialDelaySeconds: 20}
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: inference-gpu, namespace: interviewer }
spec:
  replicas: 1
  selector: { matchLabels: { app: inference } }
  template:
    metadata: { labels: { app: inference } }
    spec:
      nodeSelector: { accelerator: nvidia }
      containers:
        - name: inference
          image: ghcr.io/org/interviewer-inference:latest
          ports: [{containerPort: 8082}]
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "4"
              memory: 16Gi
            requests:
              cpu: "2"
              memory: 8Gi
---
apiVersion: v1
kind: Service
metadata: { name: api, namespace: interviewer }
spec:
  selector: { app: api }
  ports: [{port: 80, targetPort: 8080}]
---
apiVersion: v1
kind: Service
metadata: { name: inference, namespace: interviewer }
spec:
  selector: { app: inference }
  ports: [{port: 80, targetPort: 8082}]
