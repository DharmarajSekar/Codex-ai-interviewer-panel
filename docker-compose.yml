version: '3.9'

x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT:-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  JWT_ISSUER: ${JWT_ISSUER}
  JWT_AUDIENCE: ${JWT_AUDIENCE}

x-healthcheck: &healthcheck
  interval: 30s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  api:
    build: ./services/api
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      <<: *healthcheck

  realtime:
    build: ./services/realtime
    env_file: .env
    environment:
      <<: *common-env
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS}
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthz"]
      <<: *healthcheck

  inference:
    build: ./services/inference
    env_file: .env
    environment:
      <<: *common-env
      NVIDIA_VISIBLE_DEVICES: all
      MODEL_CACHE_DIR: /models
    volumes:
      - model-cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/healthz"]
      <<: *healthcheck

  worker:
    build: ./services/worker
    env_file: .env
    environment:
      <<: *common-env
    depends_on:
      - redis
      - postgres

  frontend:
    build: ./services/frontend
    environment:
      API_BASE_URL: https://api.localhost
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/healthz"]
      <<: *healthcheck

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - api
      - realtime

  api-gateway:
    image: kong:3.8
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./nginx/api-gateway/kong.yml:/opt/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: interviewer
      POSTGRES_USER: interviewer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data

  prometheus:
    image: prom/prometheus:v3.0.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3001:3000"

  loki:
    image: grafana/loki:3.2.0
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    ports:
      - "3100:3100"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./monitoring/otel/collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  pgdata:
  redisdata:
  model-cache:
  grafanadata:
